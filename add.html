<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giao Bài</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
    <a href="index.html"><i class="bi bi-house-heart-fill"></i></a>
    <a href="add.html"><i class="bi bi-clipboard-check-fill"></i></a>
    <a href="library.html"><i class="bi bi-book-fill"></i></a>
    <a href="password.html"><i class="bi bi-person-fill-gear"></i></a>
    <button onclick="logout()"><i class="bi bi-box-arrow-right"></i></button>
</nav>

<h1 id="formTitle">Giao bài</h1>

<div class="box">

    <!-- CHỌN LOẠI -->
    <label>Loại bài</label>
    <select id="type" required>
        <option value="" disabled selected>--Chọn--</option>
        <option value="text">Văn bản</option>
        <option value="link">Link</option>
        <option value="image">Ảnh</option>
    </select>

    <!-- INPUT DYNAMIC -->
    <div id="inputArea"></div>

    <!-- CHỌN NGƯỜI -->
    <label>Giao cho</label>
    <select id="user" required>
        <option value="" disabled selected>--Chọn người làm--</option>
        <option value="me">Cấn Xuân Tùng</option>
        <option value="friend">Vương Khánh Ly</option>
    </select>

    <!-- NGÀY -->
    <label>Ngày hết hạn</label>
    <input 
        type="text" 
        id="deadline" 
        placeholder="dd/mm/yyyy"
    >

    <button id="submitBtn" onclick="addTask()">Giao</button>

</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
