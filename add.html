<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giao Bài</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
    <a href="index.html">Trang chủ</a>
    <a href="add.html">Giao bài</a>
    <a href="password.html">Đổi mật khẩu</a>
    <button onclick="logout()">Đăng xuất</button>
</nav>

<h1>Giao bài</h1>

<div class="box">

    <!-- CHỌN LOẠI -->
    <label>Loại bài</label>
    <select id="type" required>
        <option value="" disabled selected>--Chọn--</option>
        <option value="text">Văn bản</option>
        <option value="link">Link</option>
        <option value="image">Ảnh</option>
    </select>

    <!-- INPUT DYNAMIC -->
    <div id="inputArea"></div>

    <!-- CHỌN NGƯỜI -->
    <label>Giao cho</label>
    <select id="user" required>
        <option value="" disabled selected>--Chọn người làm--</option>
        <option value="me">Cấn Xuân Tùng</option>
        <option value="friend">Vương Khánh Ly</option>
    </select>

    <!-- NGÀY -->
    <label>Ngày hết hạn</label>
    <input 
        type="text" 
        id="deadline" 
        placeholder="dd/mm/yyyy"
    >

    <button onclick="addTask()">Giao</button>

</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
