<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Learning Chinese</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Learning Chinese</h1>

<!-- LOGIN -->
<div id="loginBox">
    <h2>Login</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">
    <button onclick="logout()">Logout</button>

    <h2>➕ Thêm bài</h2>
    <input id="content" placeholder="Nội dung">
    
    <select id="user">
        <option value="me">Cấn Xuân Tùng</option>
        <option value="friend">Vương Khánh Ly</option>
    </select>

    <input type="date" id="deadline">
    <button onclick="addTask()">Add</button>

    <h2>📋 Danh sách</h2>
    <div id="tasks"></div>

    <h2>🏆 Leaderboard</h2>
    <div id="leaderboard"></div>

    <h3>🔐 Đổi mật khẩu</h3>

    <input id="currentPassword" type="password" placeholder="Mật khẩu hiện tại">
    <input id="newPassword" type="password" placeholder="Mật khẩu mới">

    <button onclick="changePassword()">Đổi mật khẩu</button>

    <p id="passwordMessage"></p>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
